<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>adventex</title>

  <link rel="stylesheet" media="all" href="css/main.css">
  <link rel="stylesheet" media="all" href="css/jquery.terminal.min.css">


</head>

<body>
  <!--[if IE]>
      <p class="browserupgrade">You are using an <strong>outdated</strong> browser. Please <a href="http://browsehappy.com/">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->

  <div class="advntx">
    <header class="header">
       <div class="float-end hidden-sm">
        <a href="https://github.com/soster/adventex">
          <img src="https://s3.amazonaws.com/github/ribbons/forkme_right_gray_6d6d6d.png" alt="Fork me on GitHub">
        </a>
      </div>

      <h3 class="text-muted">adventex</h3>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <img id="imagecontainer" src="img/adventex.png" width="100%" alt="" />
        <h4 class="text-muted">Games:</h4>
        <span id="game_buttons"></span>
      </aside>

      <main class="main">
        <div id="inventory_container" class="hidden-sm">
          <h3>Inventory</h3>
          <div id="inventory">
            <p class="inventory_item"></p>
          </div>
        </div>
        <div id="terminal"></div>
      </main>
    </div>

    <div class="scroller">
      <div class="btn-group">
        <button type="button" class="btn" id="btn_take" onclick="advntx.terminalLink('take');">Take</button>
        <button type="button" class="btn" id="btn_open" onclick="advntx.terminalLink('open');">Open</button>
        <button type="button" class="btn" id="btn_close" onclick="advntx.terminalLink('close');">Close</button>
        <button type="button" class="btn" id="btn_examine" onclick="advntx.terminalLink('examine');">Examine</button>
        <button type="button" class="btn" id="btn_look" onclick="advntx.executeLink('look');">Look</button>
        <button type="button" class="btn" id="btn_enter" onclick="advntx.executeCurrent();">↵</button>
      </div>
    </div>

    <div class="scroller">
      <div class="btn-group">
        <button type="button" class="btn" id="btn_help">Help</button>
        <button type="button" class="btn" id="btn_save_storage">Save</button>
        <button type="button" class="btn" id="btn_load_storage">Load</button>
        <button type="button" class="btn" id="btn_list_storage">List</button>
        <button type="button" class="btn" id="btn_restart">Restart</button>
      </div>
    </div>

    <div class="options-toggle">
      <button type="button" class="btn" id="btn_options" onclick="$('#options').toggle();">Options</button>
    </div>

    <div id="options" class="hidden">
      <div class="btn-group">
        <button type="button" class="btn" id="btn_invert" onclick="advntx.toggleTerminalColors();">Invert colors</button>
      </div>
      <div class="btn-group">
        <button type="button" class="btn" id="btn_save_file">Download savegame</button>
      </div>
      <div class="btn-group">
        <span class="btn">
          <input type="file" id="selectFiles" value="Import" />
        </span>
        <button type="button" class="btn" id="btn_load_file">Load from file</button>
      </div>
    </div>

    <footer class="footer smalltext">
      <div class="footer-inner">
        <div>
          <p>2018
            <a href="https://osteronline.de/" target="_blank" alt="Stefan Ostermann">Stefan Ostermann</a>
          </p>
          <p>
            <a href="https://thoster.net/" target="_blank">thoster.net</a>
          </p>
        </div>
        <div>
          <span aria-hidden="true"></span>
          Framework:
          <a href="http://terminal.jcubic.pl/" target="_blank">JQuery Terminal</a>
        </div>
      </div>
    </footer>
  </div>
  <!-- FIXME global variable, value is replaced by gulp-version-number -->
  <script>
    var g_ver = 'VERSION_REPLACE';
  </script>

  <script src="js/functions.js"></script>
  <script src="js/jquery.min.js"></script>
  <script src="js/jquery.terminal.min.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
